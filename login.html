<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-[Manrope] font-sans">
    <div class="flex bg-red-100 min-h-screen justify-center items-center px-6 py-8 sm:px-10 lg:px-16 xl:px-32 lg:py-22">
      <div
        class="w-full max-w-6xl lg:max-h-[600px] bg-white border border-gray-300 rounded-xl flex flex-col lg:flex-row overflow-hidden shadow-md "
      >
        <!-- bagian kiri untuk gambar (disembunyikan di bawah 1024px) -->
        <div class="hidden lg:block lg:w-1/2 rounded-xl overflow-hidden">
          <img
            src="/assets/loginpage.jpg"
            alt="login"
            class="w-full h-full object-cover"
          />
        </div>
        <!-- bagian kanan untuk login -->
        <div class="w-full lg:w-1/2 flex flex-col items-center px-6 py-8 sm:px-10 sm:py-10">
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-sans font-bold font-[Poppins] text-center text-teal-900">
            LOGIN AKUN
          </h1>
          <h2 class="text-center text-gray300 mt-2 mb-6">
            Login Akun untuk masuk ke dalam web
          </h2>
          <!-- Form pengisian sign in -->
          <div class="w-full flex flex-col gap-4">
            <input
              type="text"
              placeholder="Email or Username"
              class="w-full border border-gray-300 rounded-md px-4 py-2"
            />

            <input
              type="password"
              placeholder="Password"
              class="w-full border border-gray-300 rounded-md px-4 py-2"
            />
            <a href="#" class="text-sm text-[#a7232e] self-end -mt-2"
              >Forgot Password?</a
            >

            <!-- Sementara Sign In navigasi ke index.html -->
            <a href="siswa.html"
              class="w-full bg-[#a7232e] text-white rounded-md py-2 text-center cursor-pointer inline-block border border-[#a7232e] transition hover:bg-transparent hover:text-[#a7232e] hover:border-[#a7232e]"
            >
              Sign In
            </a>

            <p class="text-center text-gray-400 text-sm">Or</p>
            <div class="w-full">
              <button
                class="w-full border border-gray-300 rounded-md py-2 flex items-center justify-center gap-2 cursor-pointer hover:border-[#a7232e] transition transition-colors duration-300 hover:text-[#a7232e]"
              >
                <img
                  src="/assets/google-Logo.png"
                  alt="Logo Google"
                  class="w-4 h-4 object-contain shrink-0"
                />
                <span>Continue with Google</span>
              </button>
            </div>
            <div>
              <button
                class="w-full border border-gray-300 rounded-md py-2 flex items-center justify-center gap-2 cursor-pointer hover:border-[#a7232e] transition transition-colors duration-300 hover:text-[#a7232e]"
              >
                <img
                  src="/assets/apple-logo.png"
                  alt="Logo Apple"
                  class="w-4 h-4 object-contain shrink-0"
                />
                Continue with Apple
              </button>
            </div>
          </div>
          <p class="text-sm text-gray-500 mt-6">
            Don't have an Account?
            <span class="text-[#a7232e] font-medium cursor-pointer"
              >Register</span
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
